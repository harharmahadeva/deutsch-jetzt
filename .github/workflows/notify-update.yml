name: Notify users on update

on:
  push:
    branches: [main]

jobs:
  send-email:
    runs-on: ubuntu-latest
    environment: email-approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send invite email to Rudra
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: oranjeraksha@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: rudrasharma271255@gmail.com
          bcc: oranjeraksha@gmail.com
          from: Sandeep Sharma <oranjeraksha@gmail.com>
          subject: "Sandeep Sharma has invited you to try Speako - German Learning App"
          convert_markdown: false
          html_body: |
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f1f5f9;padding:40px 16px;">
                <tr><td align="center">
                  <table width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

                    <!-- Header -->
                    <tr>
                      <td style="background:#0f172a;padding:28px 32px 22px;">
                        <div style="font-family:'Barlow Condensed',Impact,sans-serif;font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:5px;">
                          <span style="color:#e87722;">Oranje</span><span style="color:#f9fafb;">Raksha</span>
                        </div>
                        <div style="font-size:10px;color:#64748b;font-style:italic;">Uw Schild, Onze Belofte &nbsp;·&nbsp; Your Shield, Our Promise</div>
                      </td>
                    </tr>

                    <!-- Orange bar -->
                    <tr><td style="background:#e87722;height:3px;font-size:0;">&nbsp;</td></tr>

                    <!-- Body -->
                    <tr>
                      <td style="padding:32px 32px 24px;">

                        <p style="font-size:12px;color:#94a3b8;margin:0 0 6px 0;text-transform:uppercase;letter-spacing:2px;font-weight:700;">You're Invited</p>
                        <h1 style="font-size:22px;font-weight:900;color:#0f172a;margin:0 0 8px 0;">Welcome to Speako, Rudra!</h1>
                        <p style="font-size:14px;color:#475569;line-height:1.7;margin:0 0 28px 0;">Sandeep Sharma has personally invited you to try <strong>Speako</strong> - a German language learning app built to help you learn German step by step, at your own pace.</p>

                        <!-- Login details -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f8fafc;border-radius:8px;border-left:3px solid #e87722;margin-bottom:28px;">
                          <tr>
                            <td style="padding:18px 22px;">
                              <p style="font-size:11px;font-weight:700;color:#e87722;text-transform:uppercase;letter-spacing:2px;margin:0 0 12px 0;">Your Login Details</p>
                              <p style="font-size:14px;color:#0f172a;margin:0 0 6px 0;"><strong>Username:</strong> rudr</p>
                              <p style="font-size:14px;color:#0f172a;margin:0;">PIN: Sandeep will share this with you directly</p>
                            </td>
                          </tr>
                        </table>

                        <!-- Install instructions -->
                        <p style="font-size:11px;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:2px;margin:0 0 14px 0;">How to Install on Android</p>
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f8fafc;border-radius:8px;margin-bottom:28px;">
                          <tr>
                            <td style="padding:18px 22px;">
                              <ol style="margin:0;padding-left:18px;font-size:13px;color:#374151;line-height:2;">
                                <li>Open <strong>Google Chrome</strong> on your Android phone</li>
                                <li>Go to: <a href="https://deutsch-jetzt.vercel.app" style="color:#1d4ed8;font-weight:700;">https://deutsch-jetzt.vercel.app</a></li>
                                <li>Tap the <strong>three dots menu</strong> (top right corner)</li>
                                <li>Tap <strong>"Add to Home screen"</strong></li>
                                <li>Tap <strong>"Add"</strong> to confirm</li>
                                <li>Speako will appear on your home screen like a regular app</li>
                                <li>Open it, enter username <strong>rudr</strong> and the PIN Sandeep shares with you</li>
                              </ol>
                            </td>
                          </tr>
                        </table>

                        <!-- How it works -->
                        <p style="font-size:11px;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:2px;margin:0 0 14px 0;">How the App Works</p>
                        <p style="font-size:13px;color:#374151;line-height:1.8;margin:0 0 12px 0;">Speako follows an <strong>immersion-first approach</strong> - you start by listening and speaking, not reading and writing. This is how children naturally learn a language and it is the most effective method.</p>

                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">

                          <tr>
                            <td style="padding:10px 0;border-bottom:1px solid #f1f5f9;">
                              <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Day by Day Structure</p>
                              <p style="font-size:13px;color:#475569;margin:0;line-height:1.7;">Each day is one focused lesson. Complete it, come back the next day for the next one. Even 10 minutes a day builds fluency fast.</p>
                            </td>
                          </tr>

                          <tr>
                            <td style="padding:10px 0;border-bottom:1px solid #f1f5f9;">
                              <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Step 1 - Listen First</p>
                              <p style="font-size:13px;color:#475569;margin:0;line-height:1.7;">Every word and sentence is spoken aloud in German. Tap play and just listen. Get used to the sounds before you speak.</p>
                            </td>
                          </tr>

                          <tr>
                            <td style="padding:10px 0;border-bottom:1px solid #f1f5f9;">
                              <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Step 2 - Speak Out Loud</p>
                              <p style="font-size:13px;color:#475569;margin:0;line-height:1.7;">Tap the mic and say the word yourself. The app listens and tells you instantly if you said it correctly. Don't worry about being perfect - just keep trying.</p>
                            </td>
                          </tr>

                          <tr>
                            <td style="padding:10px 0;border-bottom:1px solid #f1f5f9;">
                              <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Build Up Gradually</p>
                              <p style="font-size:13px;color:#475569;margin:0;line-height:1.7;">Each lesson introduces new vocabulary in context - greetings, numbers, daily life, colours, food and more. By Day 7 you will have a solid spoken foundation.</p>
                            </td>
                          </tr>

                          <tr>
                            <td style="padding:10px 0;border-bottom:1px solid #f1f5f9;">
                              <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Daily Streak</p>
                              <p style="font-size:13px;color:#475569;margin:0;line-height:1.7;">Every day you complete a lesson, your streak grows. Keep it going - consistency is everything in language learning.</p>
                            </td>
                          </tr>

                          <tr>
                            <td style="padding:10px 0;">
                              <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Cloud Progress</p>
                              <p style="font-size:13px;color:#475569;margin:0;line-height:1.7;">Everything saves automatically. Pick up exactly where you left off, on any device, anytime.</p>
                            </td>
                          </tr>

                        </table>

                        <!-- Tips -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#fffbeb;border-radius:8px;border-left:3px solid #f59e0b;margin-bottom:28px;">
                          <tr>
                            <td style="padding:18px 22px;">
                              <p style="font-size:11px;font-weight:700;color:#b45309;text-transform:uppercase;letter-spacing:2px;margin:0 0 12px 0;">Tips for Best Results</p>
                              <ul style="margin:0;padding-left:16px;font-size:13px;color:#374151;line-height:2;">
                                <li>Use headphones for the best audio experience</li>
                                <li>Find a quiet spot when practicing speaking - the mic works best without background noise</li>
                                <li>One lesson a day beats multiple lessons in one go - your brain retains more with spaced repetition</li>
                                <li>Never skip the speaking step - that is where the real learning happens</li>
                              </ul>
                            </td>
                          </tr>
                        </table>

                        <p style="font-size:13px;color:#94a3b8;margin:0;">Any questions, contact Sandeep directly at <strong>sandeepsharma1984@gmail.com</strong>. Please do not reply to this email.</p>

                      </td>
                    </tr>

                    <!-- Divider -->
                    <tr><td style="padding:0 32px;"><div style="height:1px;background:#e2e8f0;"></div></td></tr>

                    <!-- Signature -->
                    <tr>
                      <td style="padding:20px 32px;">
                        <table cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td style="padding-right:16px;border-right:3px solid #e87722;vertical-align:middle;white-space:nowrap;">
                              <div style="font-family:'Barlow Condensed',Impact,sans-serif;font-size:20px;font-weight:900;letter-spacing:-1px;line-height:1;">
                                <span style="color:#e87722;">Oranje</span><span style="color:#0f172a;">Raksha</span>
                              </div>
                              <div style="font-size:9px;color:#94a3b8;font-style:italic;margin-top:3px;">Uw Schild, Onze Belofte</div>
                            </td>
                            <td style="padding-left:16px;vertical-align:middle;">
                              <div style="font-size:11px;color:#64748b;line-height:1.8;">
                                oranjeraksha@gmail.com<br>
                                www.oranjeraksha.nl
                              </div>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>

                    <!-- Divider -->
                    <tr><td style="padding:0 32px;"><div style="height:1px;background:#e2e8f0;"></div></td></tr>

                    <!-- Footer -->
                    <tr>
                      <td style="background:#0f172a;padding:12px 32px;text-align:center;">
                        <p style="font-size:10px;color:#374151;margin:0;">Private access only &nbsp;·&nbsp; Speako by OranjeRaksha</p>
                      </td>
                    </tr>

                  </table>
                </td></tr>
              </table>

            </body>
            </html>
